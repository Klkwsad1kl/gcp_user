{% extends "base.html" %}
{% block title %}Home – GCP User Portal{% endblock %}

{% block content %}
<div class="card">
  <h1>Welcome</h1>
  {% if user %}
    <p>You are logged in as <strong>{{ user['username'] }}</strong>.</p>
  {% else %}
    <p>Please sign up or log in.</p>
    <p><a href="{{ url_for('signup') }}">Create account</a> · <a href="{{ url_for('login') }}">Log in</a></p>
  {% endif %}
</div>
{% endblock %}
