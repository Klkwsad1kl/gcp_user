{% extends "base.html" %}
{% block title %}Forgot Password – GCP User Portal{% endblock %}

{% block content %}
<div class="card form-card">
  <h2>Reset Your Password</h2>
  <p>Enter the email address associated with your account and we will generate a password reset link.</p>

  <form method="POST" action="{{ url_for('forgot_password') }}" novalidate>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email"
             placeholder="you@example.com" required />
    </div>

    <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
  </form>

  <p class="form-footer">
    <a href="{{ url_for('login') }}">Back to login</a>
  </p>
</div>
{% endblock %}
